<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidate Board</title>
  <link rel="stylesheet" href="Board.css" />
</head>4

<body>
  <header>
    <h1 class="title">DEar BoArd</h1>
  </header>

  <main>
    <p class="title2" id="questionText"></p>

    <input id="answer" type="text" placeholder="Type your answer..." class="answerBox" />
    <button id="unlockBtn" class="unlockBtn">Submit</button>

    <p id="message" class="message"></p>

    <!-- Hidden paragraph (your letter) -->
    <p id="letter" class="title3" style="display:none;">
      Bla bla
    </p>
  </main>

  <div class="title5">
    <nav>
      <a href="index.html">go back</a>
    </nav>
  </div>

  <script>
    // Edit your 5 questions + answers here
    const quiz = [
      { q: "Answer this to unlock the letter:<br>1) how many minions are in the minion movie?", a: "10400" },
      { q: "2) (gay + Bisexual - Senno) * Pinquins = ?", a: "gay" },
      { q: "3) How sexy is kunkert on a scale of 1 to ∞ ?", a: "10345" },
      { q: "4) in which amazing village did i grew up?", a: "Krimpen aan den ijssel" },
      { q: "5) what is the hexacode of proto groen?", a: "0" }
    ];

    let current = 0;

    const questionText = document.getElementById("questionText");
    const answerInput = document.getElementById("answer");
    const unlockBtn = document.getElementById("unlockBtn");
    const letter = document.getElementById("letter");
    const message = document.getElementById("message");

    function showQuestion() {
      questionText.innerHTML = quiz[current].q;
      answerInput.value = "";
      answerInput.focus();
      message.textContent = "";
    }

    function tryAnswer() {
      const userAnswer = answerInput.value.trim().toLowerCase();
      const correctAnswer = quiz[current].a.trim().toLowerCase();

      if (userAnswer === correctAnswer) {
        message.textContent = "✅ Correct! Next question 👀";
        current++;

        if (current === quiz.length) {
          // Unlocked!
          letter.style.display = "block";
          questionText.innerHTML = "🎉 You unlocked the letter!";
          answerInput.style.display = "none";
          unlockBtn.style.display = "none";
          message.textContent = "✅ Queen behavior. You did it.";
        } else {
          setTimeout(showQuestion, 600);
        }
      } else {
        message.textContent = "❌ Nope. Try again bestie.";
      }
    }

    // Click button
    unlockBtn.addEventListener("click", tryAnswer);

    // Press Enter in the input
    answerInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        tryAnswer();
      }
    });

    // Start the quiz
    showQuestion();
  </script>
</body>
</html>
